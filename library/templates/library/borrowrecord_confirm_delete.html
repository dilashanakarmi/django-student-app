{% extends "base.html" %}

{% block title %}Delete Record{% endblock %}

{% block content %}
    <div style="text-align: center; padding: 2rem; max-width: 500px; margin: 0 auto;">
        <h1 style="color: #e74c3c;">⚠️ Delete Record</h1>
        
        <div class="warning-box">
            <p>Are you sure you want to delete this borrow record?</p>
            <p style="font-weight: bold;">{{ object.member.get_full_name }} - {{ object.book.title }}</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary" style="background-color: #e74c3c; padding: 0.8rem 2rem;">
                🗑️ Yes, Delete
            </button>
            <a href="{% url 'library:borrowrecord_list' %}" class="btn btn-primary" style="padding: 0.8rem 2rem;">
                ❌ Cancel
            </a>
        </form>
    </div>
{% endblock %}
