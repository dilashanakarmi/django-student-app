{% extends "base.html" %}

{% block title %}Delete Book - Confirmation{% endblock %}

{% block content %}
    <div style="text-align: center; padding: 2rem; max-width: 500px; margin: 0 auto;">
        <h1 style="color: #e74c3c;">⚠️ Delete Book</h1>
        <div style="margin: 1.5rem 0; background-color: #ecf0f1; padding: 1.5rem; border-radius: 5px;">
    <form method="get" action="{% url 'library:search_members' %}" style="display: flex; gap: 1rem;">
        <input type="text" name="q" placeholder="Search members by name or email..." 
               style="flex: 1; padding: 0.8rem; border: 1px solid #ddd; border-radius: 5px;">
        <button type="submit" class="btn btn-primary">🔍 Search</button>
    </form>
</div>
        <div class="warning-box" style="margin: 2rem 0;">
            <p style="font-size: 1.1rem;">
                Are you sure you want to delete this book?
            </p>
            <p style="font-weight: bold; color: #2c3e50;">
                "{{ object.title }}" by {{ object.author }}
            </p>
            <p style="color: #666;">This action cannot be undone.</p>
        </div>
        
        <form method="post" style="margin: 2rem 0;">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary" style="background-color: #e74c3c; padding: 0.8rem 2rem;">
                🗑️ Yes, Delete
            </button>
            <a href="{% url 'library:book_detail' object.id %}" class="btn btn-primary" style="padding: 0.8rem 2rem;">
                ❌ Cancel
            </a>
        </form>
    </div>
{% endblock %}
